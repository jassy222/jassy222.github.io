<div class="text-box"><h2>Featured events</h2><div class="event"><h4>Research Seminar<br>Presentation of PhD research<br>Monash University - May 28</h4></div></section>
<div class="grid">
  <script>
    const API_KEY='YOUR_API_KEY';
    const CALENDAR_ID='eq2ju7i4jsg9kcboogtindud4o@group.calendar.google.com';
    const url=`https://www.googleapis.com/calendar/v3/calendars/${eq2ju7i4jsg9kcboogtindud4o@group.calendar.google.com}/events?key=${API_KEY}&singleEvents=true&orderBy=startTime&timeMin=${new Date().toISOString()}`;
    fetch(url)
    .then(r=>r.json())
    .then(data=>{
     const wrap=document.getElementById('events');
     wrap.innerHTML='';
     if(!data.items || !data.items.length){wrap.innerHTML='<p>No upcoming events.</p>';return;}
     data.items.forEach(ev=>{
       const d=document.createElement('div');
       d.className='event';
       const when=ev.start.dateTime || ev.start.date;
       const desc=ev.description || '';
       const match=desc.match(/https?:\/\/\S+/);
       const ticket=match ? match[0] : '';
       d.innerHTML=`<h2>${ev.summary||'Untitled Event'}</h2><div class='date'>${new Date(when).toLocaleString()}</div><p>${desc.replace(/https?:\/\/\S+/,'')}</p>${ticket?`<a class='button' href='${ticket}' target='_blank'>Buy Tickets</a>`:''}`;
       wrap.appendChild(d);
     });
    })
    .catch(()=>document.getElementById('events').innerHTML='<p>Unable to load events.</p>');
    </script>
